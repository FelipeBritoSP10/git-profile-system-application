<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Git Profile | System Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary border-opacity-25 sticky-top">
        <div class="container">
            <a class="navbar-brand text-uppercase fw-bold letter-spacing-2" href="#"style="font-family: 'Courier New', Courier, monospace;">
                git<span class="text-primary">.profile</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fw-light fs-6">
                    <li class="nav-item"><a class="nav-link px-3" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">Repositories</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="#">System Status</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center text-center">
            <div class="col-12 mb-4">
                <h1 class="display-5 fw-bold mb-3">Explorar desenvolvedores</h1>
                <p class="text-secondary">Insira um nome de usuário do GitHub para analisar métricas profissionais.</p>
            </div>
            <div class="col-12 col-md-8 col-lg-6">
                <form class="d-flex" role="search" id="githubSearchForm">
                    <div class="input-group input-group-lg shadow-lg">
                        <input type="search" id="usernameInput"
                            class="form-control bg-dark border-secondary border-opacity-50 text-white"
                            placeholder="Pesquisar usuário por ID..." required autofocus>
                        <button class="btn btn-primary px-4" type="submit" id="searchBtn">
                            Buscar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

<div class="row d-flex justify-content-center">
  <div id="result" class="col-12 col-md-8 col-lg-6">
    </div>
</div>

    <footer class="footer mt-auto py-5 border-top border-secondary border-opacity-25"
        style="background-color: var(--bg-deep);">
        <div class="container">
            <div class="row g-4 align-items-center">
                <div class="col-md-4 text-center text-md-start">
                    <span class="text-uppercase fw-bold letter-spacing-2"
                        style="font-family: 'Courier New', Courier, monospace;">
                        git<span class="text-primary">.profile</span>
                    </span>
                    <p class="text-secondary fs-7 mt-2 mb-0">System Architecture</p>
                </div>

                <div class="col-md-4 text-center">
                    <a href="#" class="text-muted text-decoration-none px-2 fs-7 hover-primary">Documentation</a>
                    <a href="#" class="text-muted text-decoration-none px-2 fs-7 hover-primary">API Status</a>
                    <a href="#" class="text-muted text-decoration-none px-2 fs-7 hover-primary">Privacy</a>
                </div>

                <div class="col-md-4 text-center text-md-end">
                    <div class="d-inline-flex align-items-center">
                        <span class="badge border border-primary text-primary bg-transparent fs-7 rounded-0">
                            <span class="spinner-grow spinner-grow-sm me-1" style="width: .5rem; height: .5rem;"></span>
                            SYSTEM ONLINE
                        </span>
                    </div>
                </div>
            </div>
            <div class="row mt-4">
                <div class="col-12 text-center">
                    <div class="text-secondary fs-7 fw-light" style="letter-spacing: 1px;">
                        <span class="text-white">GIT.PROFILE</span>
                        <span class="mx-2 opacity-50">|</span>
                        ENGINEERED BY <span class="text-primary fw-bold">DOUGLAS</span>
                        <span class="mx-2 opacity-50">|</span>
                        &copy; 2026
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/api.js"></script>

</body>
</html>
